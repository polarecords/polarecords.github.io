<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="darkreader-lock">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- SEO & Standards -->
    <title>Media Archive | PolaRecords Uplink</title>
    <meta name="description" content="Media Archive: Visual fragments and performance flyers from the PolaRecords repository. Historical records from 2025-2026.">
    
    <!-- PWA & Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#031A16">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="john.html">
    <link rel="prefetch" href="polaraf.html">
    <link rel="prefetch" href="polarband.html">
</head>
<body class="theme-media">
    <div id="header-marquee">
        <span>ARCHIVE: VISUAL_FRAGMENT_REPOSITORY</span>
    </div>

    <main class="content-body">
        <div class="output-line"><span class="highlight">MEDIA ARCHIVE</span></div>
        <div class="output-line">Direct uplinks to PolaRecords fragments.</div>
        
        <div class="section-title">Latest Flyer</div>
        <figure class="featured-poster">
            <img src="assets/flyer_20260505.jpg" alt="Songwriter Nights Flyer: May 5th 2026 at The Nick">
            <figcaption class="poster-label">FRAGMENT_2026_05_05.JPG</figcaption>
        </figure>

        <div class="section-title">Historical Fragments</div>
        <div id="dynamic-media-grid" class="media-grid"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="john.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>John</span>
        </a>
        <a href="polaraf.html" class="nav-item">
            <i class="fas fa-bolt"></i>
            <span>AF</span>
        </a>
        <a href="polarband.html" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Band<span class="nav-soon">Coming Soon</span></span>
        </a>
        <a href="media.html" class="nav-item active">
            <i class="fas fa-image"></i>
            <span>Media</span>
        </a>
    </nav>
    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox-overlay">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-poster-container">
            <div class="tape top-tape"></div>
            <div class="tape bottom-tape"></div>
            <img id="lightbox-img" class="lightbox-poster">
        </div>
    </div>
    <script>
        const modal = document.getElementById('lightbox-modal');
        const modalImg = document.getElementById('lightbox-img');
        document.querySelectorAll('img').forEach(img => {
            if(img.closest('.featured-poster') || img.closest('.art-fragment')) {
                img.style.cursor = 'pointer';
                img.onclick = function() {
                    modal.style.display = "flex";
                    modalImg.src = this.src;
                }
            }
        });
        modal.onclick = function() { modal.style.display = "none"; };
    </script>
    <div class="section-title">Instagram Feed</div>
    <behold-widget feed-id="4DQL3AO7ovFW2CNrpNGp"></behold-widget>
    <script>
      (() => {
        const d=document,s=d.createElement("script");s.type="module";
        s.src="https://w.behold.so/widget.js";d.head.append(s);
      })();
    </script>

    <script src="app.js"></script>
</body>
</html>
