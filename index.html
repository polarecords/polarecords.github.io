<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolaRecords Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-marquee">
        <span>POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS</span>
    </div>

    <div id="terminal">
        <div id="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');

        const content = {
            home: `
                <div class="output-line">Welcome to <span class="highlight">PolaRecords</span>.</div>
                <div class="output-line">Select a path:</div>
                <div class="nav-link" onclick="show('john')">John Polar</div>
                <div class="nav-link" onclick="show('polaraf')">PolarAF</div>
                <div class="nav-link" onclick="show('polarband')">PolarBand</div>
                <div class="nav-link" onclick="show('media')">Media Archive</div>
            `,
            john: `
                <div class="output-line"><span class="highlight">JOHN POLAR</span></div>
                <div class="output-line">Songwriter and performer based in Birmingham, Alabama.</div>
                <div class="output-line">A regular at <span class="highlight">The Nick's Songwriters Night</span> and <span class="highlight">True Story Brewing</span>.</div>
                <div class="output-line">Current project: <span class="highlight">Polar & The Boys</span>.</div>
                <div class="output-line">Archive: <a href="https://youtube.com/@thejohnpolar" target="_blank" style="color:#fff">YouTube</a> | <a href="https://www.tiktok.com/@thejohnpolar" target="_blank" style="color:#fff">TikTok</a></div>
                <div class="output-line">Social: <a href="https://www.instagram.com/thejohnpolar/" target="_blank" style="color:#fff">Instagram</a> | <a href="https://www.facebook.com/thejohnpolar" target="_blank" style="color:#fff">Facebook</a></div>
                <div class="output-line">More: <a href="https://www.threads.net/@thejohnpolar" target="_blank" style="color:#fff">Threads</a> | <a href="https://x.com/thejohnpolar" target="_blank" style="color:#fff">X</a></div>
                <div class="back-btn" onclick="show('home')">[ Back ]</div>
            `,
            polaraf: `
                <div class="output-line"><span class="highlight">POLARAF</span></div>
                <div class="output-line">Experimental melodic rap and freestyle jams.</div>
                <div class="output-line">Known for high-energy sets at <span class="highlight">The Nick</span>.</div>
                <div class="output-line">Connect: <a href="https://www.instagram.com/polarafmusic/" target="_blank" style="color:#fff">Instagram</a></div>
                <div class="output-line">Archive: <a href="https://youtube.com/@thejohnpolar" target="_blank" style="color:#fff">YouTube</a> | <a href="https://www.tiktok.com/@thejohnpolar" target="_blank" style="color:#fff">TikTok</a></div>
                <div class="output-line">More: <a href="https://www.threads.net/@thejohnpolar" target="_blank" style="color:#fff">Threads</a> | <a href="https://x.com/thejohnpolar" target="_blank" style="color:#fff">X</a></div>
                <div class="back-btn" onclick="show('home')">[ Back ]</div>
            `,
            polarband: `
                <div class="output-line"><span class="highlight">POLARBAND</span></div>
                <div class="output-line">AKA <span class="highlight">Polar and The Bears</span>.</div>
                <div class="output-line">Full details coming soon.</div>
                <div class="back-btn" onclick="show('home')">[ Back ]</div>
            `,
            media: `
                <div class="output-line"><span class="highlight">MEDIA ARCHIVE</span></div>
                <div class="output-line">The multi-platform home of PolaRecords.</div>
                <div class="output-line">> <span class="highlight">YouTube: @thejohnpolar (Primary)</span></div>
                <div class="output-line">Live records from <span class="highlight">The Nick</span> and <span class="highlight">True Story</span>.</div>
                <div class="output-line">> <span class="highlight">Social: @thejohnpolar & @polarafmusic</span></div>
                <div class="output-line">TikTok, Instagram, Threads, and X.</div>
                <div class="output-line">------------------------------------</div>
                <div class="output-line"><a href="https://youtube.com/@thejohnpolar" target="_blank" style="color:#fff">YouTube Archive</a></div>
                <div class="output-line"><a href="https://www.tiktok.com/@thejohnpolar" target="_blank" style="color:#fff">TikTok</a> | <a href="https://www.facebook.com/thejohnpolar" target="_blank" style="color:#fff">Facebook</a></div>
                <div class="output-line"><a href="https://www.instagram.com/thejohnpolar/" target="_blank" style="color:#fff">IG: John Polar</a> | <a href="https://www.instagram.com/polarafmusic/" target="_blank" style="color:#fff">IG: PolarAF</a></div>
                <div class="output-line"><a href="https://www.threads.net/@thejohnpolar" target="_blank" style="color:#fff">Threads</a> | <a href="https://x.com/thejohnpolar" target="_blank" style="color:#fff">X</a></div>
                <div class="back-btn" onclick="show('home')">[ Back ]</div>
            `
        };

        function show(key) {
            output.innerHTML = content[key];
            document.getElementById('terminal').scrollTop = 0;
        }

        // Initial view
        show('home');
    </script>
</body>
</html>
