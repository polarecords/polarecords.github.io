<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolaRecords Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-marquee">
        <span>POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS - POLARECORDS</span>
    </div>

    <div id="terminal">
        <div id="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');

        const content = {
            home: `
                <div class="output-line">Welcome to <span class="highlight">PolaRecords</span>.</div>
                <div class="output-line">Select a project:</div>
                <div class="nav-link" onclick="show('john')">John Polar</div>
                <div class="nav-link" onclick="show('polaraf')">PolarAF</div>
                <div class="nav-link" onclick="show('polarband')">PolarBand</div>
            `,
            john: `
                <div class="output-line"><span class="highlight">JOHN POLAR</span></div>
                <div class="output-line">Songwriter and performer based in Birmingham, Alabama.</div>
                <div class="output-line">A regular face at <span class="highlight">The Nick's Songwriters Night</span>, bringing raw, honest performances to the Tuesday night showcase.</div>
                <div class="output-line">Current project: <span class="highlight">Polar & The Boys</span>.</div>
                <div class="output-line">Connect: <a href="https://www.facebook.com/PolarAFmusic" target="_blank" style="color:#fff">Facebook</a></div>
                <div class="back-btn" onclick="show('home')">[ Back to Menu ]</div>
            `,
            polaraf: `
                <div class="output-line"><span class="highlight">POLARAF</span></div>
                <div class="output-line">Experimental melodic rap, singing, and freestyle jams.</div>
                <div class="output-line">Known for high-energy sets at <span class="highlight">The Nick</span> where local musicians join in to freestyle sounds while PolarAF freestyle raps.</div>
                <div class="output-line">Connect: <a href="https://www.instagram.com/polaraf_/" target="_blank" style="color:#fff">Instagram</a></div>
                <div class="back-btn" onclick="show('home')">[ Back to Menu ]</div>
            `,
            polarband: `
                <div class="output-line"><span class="highlight">POLARBAND</span></div>
                <div class="output-line">AKA <span class="highlight">Polar and The Bears</span>.</div>
                <div class="output-line">Full details coming soon.</div>
                <div class="back-btn" onclick="show('home')">[ Back to Menu ]</div>
            `
        };

        function show(key) {
            output.innerHTML = content[key];
            document.getElementById('terminal').scrollTop = 0;
        }

        // Initial view
        show('home');
    </script>
</body>
</html>
