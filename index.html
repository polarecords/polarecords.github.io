                <div class="output-line"><span class="highlight">FEATURED SNEAK PEAK:</span></div>
                <div class="output-line">Songwriter's Night @ The Nick [11.11.25]</div>
                
                <div id="player-container" class="player-wrapper video-mode">
                    <iframe src="https://www.youtube.com/embed/RE_9SyZ0PFE" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

                <div id="player-status" class="status-msg">System ready...</div>

                <div class="nav-link" onclick="show('polaraf')">PolarAF</div>

                <div class="nav-link" onclick="show('media')">Media Archive</div>
            `,
            john: `
                <div class="output-line"><span class="highlight">JOHN POLAR</span></div>
                <div class="output-line">Songwriter and performer based in Birmingham, Alabama.</div>
                
                <div class="log-stream">
                    <div class="log-entry"><span class="log-time">[11.11]</span> <span class="log-msg">Performance logged: Songwriter's Night @ The Nick.</span></div>

                <div class="output-line">Connect: <a href="https://www.instagram.com/polarafmusic/" target="_blank" class="highlight" style="text-decoration:none">@polarafmusic</a></div>
                
                <div class="back-btn" onclick="show('home')">[ Back ]</div>
            `,
            polarband: `
                <div class="output-line"><span class="highlight">POLARBAND</span></div>
                <div class="output-line">AKA <span class="highlight">Polar & The Boys</span>.</div>
                
                <div style="padding: 40px 0; text-align: center; border: 1px dashed #39ff14; margin: 20px 0;">
                    <div class="highlight" style="font-size: 24px; animation: pulsate 1s infinite alternate;">[ SIGNAL INTERCEPTED ]</div>

            media: `

                <div class="social-embed-container">

                <div style="display: flex; flex-wrap: wrap; gap: 10px;">

        };

        function show(key) {
            const fetching = document.getElementById('fetching');
            output.style.display = 'none';
            fetching.style.display = 'block';

            setTimeout(() => {
                fetching.style.display = 'none';
                output.style.display = 'block';
                output.innerHTML = content[key];
                document.getElementById('terminal').scrollTop = 0;
                
                // Re-process Instagram embeds if they exist in the new content
                if (window.instgrm) {
                    window.instgrm.Embeds.process();
                }
            }, 600);
        }

        function togglePlayer(mode) {
            const container = document.getElementById('player-container');
            const status = document.getElementById('player-status');
            
            const messages = {
                video: [
                    "Visual uplink established...",
                    "Decoding optical data...",
                    "Syncing frames to terminal...",
                    "Signal strength: 98%..."
                ],
                audio: [
                    "Diverting power to acoustics...",
                    "Frequency locked. Visuals offline...",
                    "Isolating sonic waveforms...",
                    "Resonating with the void..."
                ]
            };

            const randomMsg = messages[mode][Math.floor(Math.random() * messages[mode].length)];
            status.innerText = randomMsg;

            if (mode === 'audio') {
                container.classList.remove('video-mode');
                container.classList.add('audio-mode');
            } else {
                container.classList.remove('audio-mode');
                container.classList.add('video-mode');
            }
        }

        // Terminal Command Listener
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = userInput.value.trim().toLowerCase();
                userInput.value = '';

                if (command === 'help') {
                    alert('AVAILABLE COMMANDS: HOME, JOHN, POLARAF, BAND, MEDIA, CLEAR, WHOAMI');
                } else if (command === 'home') {
                    show('home');
                } else if (command === 'john') {
                    show('john');
                } else if (command === 'polaraf') {
                    show('polaraf');
                } else if (command === 'band') {
                    show('polarband');
                } else if (command === 'media') {
                    show('media');
                } else if (command === 'clear') {
                    output.innerHTML = '<div class="output-line">Terminal cleared. Type "HOME" to return.</div>';
                } else if (command === 'whoami') {
                    alert('AUTHORIZED GUEST / SIGNAL INTERCEPTOR');
                } else if (command === 'polarecords') {
                    alert('STATUS: ACTIVE / LOCATION: BIRMINGHAM, AL / MISSION: FREQUENCY RESONANCE');
                }
            }
        });

        // Focus input on terminal click
        document.getElementById('terminal').addEventListener('click', () => {
            userInput.focus();
        });

        // Initial view
        show('home');
        userInput.focus();
    </script>
</body>
</html>
