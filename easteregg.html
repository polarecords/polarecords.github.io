        function show(key) {
            const fetching = document.getElementById('fetching');
            output.style.display = 'none';
            fetching.style.display = 'block';

            const originalText = "DECRYPTING PolaRecords DATA STREAM";
            const chars = "!@#$%^&*()_+1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let iterations = 0;

            const interval = setInterval(() => {
                fetching.innerText = originalText.split("").map((char, index) => {
                    if (index < iterations) return originalText[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
                if (iterations >= originalText.length) clearInterval(interval);
                iterations += 1/3;
            }, 30);

            setTimeout(() => {
                fetching.style.display = 'none';
                output.style.display = 'block';
                output.innerHTML = content[key];
                document.getElementById("terminal").className = "theme-" + key;
                document.getElementById('terminal').scrollTop = 0;

                document.querySelectorAll('.log-entry').forEach((el, i) => {
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(-10px)';
                    el.style.transition = 'all 0.3s ease';
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateX(0)';
                    }, i * 50);
                });
            }, 800);
        }

        userInput.addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            const command = userInput.value.trim().toLowerCase();
            userInput.value = '';
            if (!command) return;

            const echoDiv = document.createElement('div');
            echoDiv.className = 'output-line highlight';
            echoDiv.textContent = `> ${command}`;
            output.appendChild(echoDiv);

            const responseDiv = document.createElement('div');
            responseDiv.className = 'output-line';
            output.appendChild(responseDiv);

            async function typeResponse(text) {
                responseDiv.textContent = '';
                for (let i = 0; i < text.length; i++) {
                    responseDiv.textContent += text[i];
                    await new Promise(r => setTimeout(r, 15));
                }
                window.scrollTo(0, document.body.scrollHeight);
            }

            const commands = { home: 'home', john: 'john', polaraf: 'polaraf', band: 'polarband', media: 'media' };

            if (command === 'help') {
                await typeResponse('AVAILABLE COMMANDS: home, john, polaraf, band, media, clear, whoami, sudo override');
            } else if (commands[command]) {
                show(commands[command]);
            } else if (command === 'clear') {
                output.innerHTML = '';
                await typeResponse('Terminal cleared. Type "home" to return.');
            } else if (command === 'whoami') {
                await typeResponse('AUTHORIZED GUEST / SIGNAL INTERCEPTOR // BIRMINGHAM_AL_NODE_01');
            } else if (command === 'sudo override') {
                document.body.style.backgroundColor = 'var(--primary)';
                document.body.style.color = 'var(--terminal-black)';
                await typeResponse('CRITICAL: MANUAL OVERRIDE INITIATED. MATRIX BYPASS IN PROGRESS...');
                setTimeout(() => {
                    document.body.style.backgroundColor = '';
                    document.body.style.color = '';
                    responseDiv.textContent = 'BYPASS FAILED. INSUFFICIENT CLEARANCE.';
                }, 3000);
            } else {
                await typeResponse(`COMMAND_NOT_FOUND: ${command}. Type 'help' for directory.`);
            }
        });

        document.getElementById('terminal').addEventListener('click', () => userInput.focus());
