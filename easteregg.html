        function show(key) {
            const fetching = document.getElementById('fetching');
            output.style.display = 'none';
            fetching.style.display = 'block';

            // Add terminal scramble effect to the fetching text
            const originalText = "DECRYPTING PolaRecords DATA STREAM";
            const chars = "!@#$%^&*()_+1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let iterations = 0;
            
            const interval = setInterval(() => {
                fetching.innerText = originalText.split("")
                    .map((char, index) => {
                        if(index < iterations) return originalText[index];
                        return chars[Math.floor(Math.random() * chars.length)]
                    })
                    .join("");
                
                if(iterations >= originalText.length) clearInterval(interval);
                iterations += 1/3;
            }, 30);

            setTimeout(() => {
                fetching.style.display = 'none';
                output.style.display = 'block';
                output.innerHTML = content[key];
                document.getElementById("terminal").className = "theme-" + key;
                document.getElementById('terminal').scrollTop = 0;
                
                // Trigger entry animation for log entries
                const entries = document.querySelectorAll('.log-entry');
                entries.forEach((el, i) => {
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(-10px)';
                    el.style.transition = 'all 0.3s ease';
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateX(0)';
                    }, i * 50);
                });

                if (window.instgrm) {
                    window.instgrm.Embeds.process();
                }
            }, 800);
        }

        function togglePlayer(mode) {
            const container = document.getElementById('player-container');
            const status = document.getElementById('player-status');
            
            const messages = {
                video: [
                    "Visual uplink established...",
                    "Decoding optical data...",
                    "Syncing frames to terminal...",
                    "Signal strength: 98%..."
                ],
                audio: [
                    "Diverting power to acoustics...",
                    "Frequency locked. Visuals offline...",
                    "Isolating sonic waveforms...",
                    "Resonating with the void..."
                ]
            };

            const randomMsg = messages[mode][Math.floor(Math.random() * messages[mode].length)];
            status.innerText = randomMsg;

            if (mode === 'audio') {
                container.classList.remove('video-mode');
                container.classList.add('audio-mode');
            } else {
                container.classList.remove('audio-mode');
                container.classList.add('video-mode');
            }
        }

        // Terminal Command Listener
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = userInput.value.trim().toLowerCase();
                userInput.value = '';

                if (command === 'help') {
                    alert('AVAILABLE COMMANDS: HOME, JOHN, POLARAF, BAND, MEDIA, CLEAR, WHOAMI');
                } else if (command === 'home') {
                    show('home');
                } else if (command === 'john') {
                    show('john');
                } else if (command === 'polaraf') {
                    show('polaraf');
                } else if (command === 'band') {
                    show('polarband');
                } else if (command === 'media') {
                    show('media');
                } else if (command === 'clear') {
                    output.innerHTML = '<div class="output-line">Terminal cleared. Type "HOME" to return.</div>';
                } else if (command === 'whoami') {
                    alert('AUTHORIZED GUEST / SIGNAL INTERCEPTOR');
                } else if (command === 'polarecords') {
                    alert('STATUS: ACTIVE / LOCATION: BIRMINGHAM, AL / MISSION: FREQUENCY RESONANCE');

            }
